name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github

      - name: Build
        run: mvn -B clean install -DskipTests

      - name: Deploy snapshots to GitHub Packages
        if: github.event_name == 'push'
        run: mvn -B org.apache.maven.plugins:maven-deploy-plugin:3.1.2:deploy -DaltDeploymentRepository=github::https://maven.pkg.github.com/webliteca/teavm-lambda
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
