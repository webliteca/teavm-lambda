name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Stage 1: Build all modules and check SPI parity ───────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn -B clean package -DskipTests -pl '!site'

      - name: Check SPI platform parity
        run: ./check-spi-parity.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          retention-days: 1
          path: |
            **/target/
            !**/target/archive-tmp/

  # ─── Stage 1b: Kotlin DSL unit + integration tests ─────────────────
  test-kotlin:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test Kotlin DSL module
        run: mvn -B clean test -pl teavm-lambda-kotlin -am

  # ─── Stage 2: Integration tests (all run in parallel) ──────────────

  test-lambda-teavm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build TeaVM Lambda demo
        run: mvn -B clean package -pl teavm-lambda-demo -am -P teavm

      - name: Run Lambda integration tests (TeaVM/Node.js)
        run: ./teavm-lambda-demo/run-tests.sh

  test-lambda-jvm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Start PostgreSQL
        run: docker compose -f docker-compose.jvm-test.yml up -d --wait

      - name: Build JVM demo (standalone server)
        run: mvn -B clean package -pl teavm-lambda-demo -am -P jvm-server

      - name: Start JVM server
        run: |
          DATABASE_URL=postgresql://demo:demo@localhost:5432/demo \
            java -jar teavm-lambda-demo/target/teavm-lambda-demo-0.1.0-SNAPSHOT.jar &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Run integration tests against JVM
        run: ./teavm-lambda-demo/test.sh http://localhost:8080

  test-cloudrun:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Cloud Run demo
        run: mvn -B clean package -pl teavm-lambda-demo-cloudrun -am

      - name: Run Cloud Run integration tests
        run: ./teavm-lambda-demo-cloudrun/run-tests.sh

  test-nosqldb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build NoSQL demo
        run: mvn -B clean package -pl teavm-lambda-demo-nosqldb -am

      - name: Run NoSQL integration tests
        run: ./teavm-lambda-demo-nosqldb/run-tests.sh

  test-image-jvm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build image modules
        run: mvn -B clean package -pl teavm-lambda-image-jvm -am

      - name: Run JVM image integration tests
        run: ./teavm-lambda-image-jvm/run-tests.sh

  test-image-js:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Node.js image integration tests
        run: ./teavm-lambda-image/run-tests.sh

  test-objectstore:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build Object Store demo
        run: mvn -B clean package -pl teavm-lambda-demo-objectstore -am

      - name: Run Object Store integration tests
        run: ./teavm-lambda-demo-objectstore/run-tests.sh

  test-messagequeue:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build Message Queue demo
        run: mvn -B clean package -pl teavm-lambda-demo-messagequeue -am

      - name: Run Message Queue integration tests
        run: ./teavm-lambda-demo-messagequeue/run-tests.sh

  test-auth:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build Auth demo
        run: mvn -B clean package -pl teavm-lambda-demo-auth -am

      - name: Run Auth integration tests (HS256)
        run: ./teavm-lambda-demo-auth/run-tests.sh

  # ─── Stage 3: Publish (only on push to main) ───────────────────────

  deploy:
    needs: [test-kotlin, test-lambda-teavm, test-lambda-jvm, test-cloudrun, test-nosqldb, test-image-jvm, test-image-js, test-objectstore, test-messagequeue, test-auth]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Deploy snapshots to GitHub Packages
        run: mvn -B clean package org.apache.maven.plugins:maven-deploy-plugin:3.1.2:deploy -DskipTests -pl '!site' -DaltDeploymentRepository=github::https://maven.pkg.github.com/webliteca/teavm-lambda
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
