name: Publish Developer Guide

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build AsciiDoc to HTML
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/documents" \
            asciidoctor/docker-asciidoctor \
            asciidoctor \
              -a toc=left \
              -a toclevels=3 \
              -a source-highlighter=rouge \
              -a icons=font \
              -a sectanchors \
              -a sectlinks \
              -a idprefix= \
              -a idseparator=- \
              -D /documents/docs \
              -o index.html \
              /documents/docs/developer-guide.adoc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
