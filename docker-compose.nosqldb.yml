# Isolated test environment for the NoSQL demo.
# DynamoDB Local runs in Docker with no host port exposure.
# SAM local invoke sends test events to Lambda containers on this network.
#
# Usage:
#   mvn clean package -pl teavm-lambda-demo-nosqldb -am
#   ./teavm-lambda-demo-nosqldb/run-tests.sh
#
# What happens:
#   1. docker-compose starts DynamoDB Local (no host ports)
#   2. A seed container creates the users table and inserts test data
#   3. sam local invoke runs each test event as a Lambda invocation
#   4. Lambda containers join this compose network to reach DynamoDB Local
#   5. Test script asserts on Lambda response JSON
#   6. docker-compose tears down everything
#
services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/shell/ || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10

  dynamodb-seed:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Create the users table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --table-name users \
          --attribute-definitions AttributeName=id,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST

        # Seed test data
        aws dynamodb put-item \
          --endpoint-url http://dynamodb:8000 \
          --table-name users \
          --item '{"id":{"S":"1"},"name":{"S":"Alice"},"email":{"S":"alice@example.com"}}'

        aws dynamodb put-item \
          --endpoint-url http://dynamodb:8000 \
          --table-name users \
          --item '{"id":{"S":"2"},"name":{"S":"Bob"},"email":{"S":"bob@example.com"}}'

        echo "DynamoDB seed complete"
