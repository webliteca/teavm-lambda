# Isolated test environment for the Object Store demo.
# MinIO runs in Docker as an S3-compatible endpoint.
# SAM local invoke sends test events to Lambda containers on this network.
#
# Usage:
#   mvn clean package -pl teavm-lambda-demo-objectstore -am
#   ./teavm-lambda-demo-objectstore/run-tests.sh
#
services:
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-seed:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/demo-bucket --ignore-existing
        echo "Hello from seed" | mc pipe local/demo-bucket/seed.txt
        echo "MinIO seed complete"
