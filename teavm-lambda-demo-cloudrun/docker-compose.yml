services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: teavm-lambda-demo-cloudrun/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://demo:demo@postgres:5432/demo
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
