<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeaVM Cloud Run Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: #333; }
        pre { background: #f4f4f4; padding: 1rem; border-radius: 4px; overflow-x: auto; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #output { white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>TeaVM Cloud Run Demo</h1>
    <p>This page is served as a static file by the Cloud Run adapter.</p>

    <h2>API Test</h2>
    <button onclick="fetchHealth()">GET /health</button>
    <button onclick="fetchUsers()">GET /users</button>
    <pre id="output">Click a button to call the API...</pre>

    <script>
        async function fetchHealth() {
            const res = await fetch('/health');
            document.getElementById('output').textContent = await res.text();
        }
        async function fetchUsers() {
            const res = await fetch('/users');
            document.getElementById('output').textContent = JSON.stringify(JSON.parse(await res.text()), null, 2);
        }
    </script>
</body>
</html>
