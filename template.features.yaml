AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Features demo Lambda function

Globals:
  Function:
    Timeout: 30
    MemorySize: 256

Resources:
  FeaturesDemoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs22.x
      CodeUri: teavm-lambda-demo-features-lambda/target/lambda/
      Environment:
        Variables:
          DATABASE_URL: postgresql://demo:demo@postgres:5432/demo
      Events:
        Root:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
