AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TeaVM Lambda NoSQL Demo - Test configuration (DynamoDB Local)

Globals:
  Function:
    Timeout: 30
    MemorySize: 256

Resources:
  DemoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: teavm-lambda-demo-nosqldb/target/lambda/
      Handler: index.handler
      Runtime: nodejs22.x
      Environment:
        Variables:
          # DynamoDB Local via compose service name
          NOSQL_URI: dynamodb://dynamodb:8000
          # Required by AWS SDK when talking to DynamoDB Local
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
      Events:
        RootRequest:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyRequest:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
